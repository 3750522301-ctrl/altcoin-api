<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>币安永续山寨币监控 - 完整版</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: linear-gradient(135deg, #07111a 0%, #0f1729 100%);
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 20px;
    }

    .container { max-width: 1600px; margin: 0 auto; }

    h1 {
      text-align: center;
      color: #06b6d4;
      margin-bottom: 20px;
      font-size: 32px;
    }

    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(34,211,238,0.2);
    }

    .tab-btn {
      background: transparent;
      border: none;
      color: #94a3b8;
      padding: 12px 16px;
      cursor: pointer;
      font-size: 14px;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .tab-btn.active {
      color: #06b6d4;
      border-bottom-color: #06b6d4;
    }

    .tab-btn:hover {
      color: #06b6d4;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      gap: 15px;
      flex-wrap: wrap;
    }

    .time-info { color: #94a3b8; font-size: 13px; }

    button {
      background: #0891b2;
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    button:hover { background: #0e7490; }

    /* 主页面样式 */
    .topbar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .card {
      background: rgba(15,23,41,0.85);
      border: 1px solid rgba(34,211,238,0.2);
      border-radius: 12px;
      padding: 16px;
      backdrop-filter: blur(10px);
    }

    .label { color: #94a3b8; font-size: 12px; margin-bottom: 8px; }
    .value { color: #06b6d4; font-size: 24px; font-weight: bold; }

    .table-wrap {
      overflow: auto;
      background: rgba(15,23,41,0.85);
      border: 1px solid rgba(34,211,238,0.2);
      border-radius: 16px;
      backdrop-filter: blur(10px);
      max-height: 800px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th, td {
      padding: 12px 14px;
      border-bottom: 1px solid rgba(148,163,184,0.15);
      text-align: left;
      white-space: nowrap;
    }

    th {
      position: sticky;
      top: 0;
      background: rgba(15,23,41,0.95);
      color: #cbd5e1;
      font-weight: 600;
      z-index: 10;
    }

    tbody tr {
      transition: background 0.2s;
      cursor: pointer;
    }

    tbody tr:hover { background: rgba(30,41,59,0.55); }

    .symbol { color: #06b6d4; font-weight: bold; }
    .green { color: #22c55e; }
    .red { color: #ef4444; }
    .gray { color: #94a3b8; }

    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      background: rgba(34,211,238,0.15);
      color: #06b6d4;
      font-size: 11px;
      margin-right: 4px;
      white-space: nowrap;
    }

    .status {
      text-align: center;
      padding: 40px;
      color: #94a3b8;
    }

    .error {
      color: #ef4444;
    }

    /* 详情页样式 */
    .detail-back {
      margin-bottom: 20px;
    }

    .detail-back button {
      background: rgba(34,211,238,0.2);
      color: #06b6d4;
      border: 1px solid rgba(34,211,238,0.3);
    }

    .detail-header {
      background: rgba(15,23,41,0.85);
      border: 1px solid rgba(34,211,238,0.2);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .detail-title {
      font-size: 28px;
      color: #06b6d4;
      margin-bottom: 15px;
    }

    .detail-score {
      display: inline-block;
      background: rgba(34,211,238,0.2);
      border: 2px solid rgba(34,211,238,0.4);
      border-radius: 8px;
      padding: 10px 20px;
      font-size: 20px;
      color: #06b6d4;
      font-weight: bold;
      margin-right: 15px;
    }

    .detail-stage {
      display: inline-block;
      background: rgba(139,92,246,0.2);
      border: 1px solid rgba(139,92,246,0.4);
      border-radius: 6px;
      padding: 8px 16px;
      color: #a78bfa;
      font-weight: bold;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    .detail-section {
      background: rgba(15,23,41,0.85);
      border: 1px solid rgba(34,211,238,0.2);
      border-radius: 12px;
      padding: 16px;
    }

    .section-title {
      color: #06b6d4;
      font-weight: bold;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(148,163,184,0.1);
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    .detail-label {
      color: #94a3b8;
      font-size: 13px;
    }

    .detail-value {
      color: #e2e8f0;
      font-weight: bold;
      text-align: right;
    }

    .links-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .link-btn {
      background: rgba(34,211,238,0.15);
      color: #06b6d4;
      border: 1px solid rgba(34,211,238,0.3);
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .link-btn:hover {
      background: rgba(34,211,238,0.3);
    }

    .coinglass-section {
      background: rgba(15,23,41,0.85);
      border: 1px solid rgba(34,211,238,0.2);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .coinglass-data {
      background: rgba(30,41,59,0.4);
      border-left: 3px solid #06b6d4;
      padding: 12px;
      border-radius: 4px;
      margin-bottom: 12px;
    }

    .coinglass-loading {
      color: #94a3b8;
      text-align: center;
      padding: 20px;
    }

    .stage-吸筹 { color: #f59e0b; }
    .stage-拉升 { color: #22c55e; }
    .stage-见顶 { color: #ef4444; }
    .stage-下跌 { color: #8b5cf6; }

    .unlock-table {
      width: 100%;
      margin-top: 12px;
    }

    .unlock-table tr {
      border-bottom: 1px solid rgba(148,163,184,0.1);
    }

    .unlock-table td {
      padding: 8px;
      font-size: 12px;
    }

    .unlock-table thead {
      background: rgba(30,41,59,0.5);
    }

    .liq-bar {
      display: flex;
      height: 20px;
      border-radius: 3px;
      overflow: hidden;
      margin: 8px 0;
      background: rgba(30,41,59,0.4);
    }

    .liq-bar-item {
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚡ 币安永续山寨币监控 - 完整版</h1>

    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('list')">币种列表</button>
      <button class="tab-btn" onclick="switchTab('detail')">币种详情</button>
    </div>

    <!-- 列表页 -->
    <div id="list" class="tab-content active">
      <div class="toolbar">
        <div class="time-info" id="last-update">最后更新：-</div>
        <button onclick="loadData()">手动刷新</button>
      </div>

      <div class="topbar">
        <div class="card">
          <div class="label">监控币种数</div>
          <div class="value" id="stat-total">-</div>
        </div>
        <div class="card">
          <div class="label">高换手(Vol/Mcap>20%)</div>
          <div class="value" id="stat-vol">-</div>
        </div>
        <div class="card">
          <div class="label">多头拥挤(Funding>0.04%)</div>
          <div class="value" id="stat-long">-</div>
        </div>
        <div class="card">
          <div class="label">平均 Funding</div>
          <div class="value" id="stat-funding">-</div>
        </div>
      </div>

      <div class="table-wrap">
        <div id="status" class="status">加载中...</div>
        <table id="table" style="display:none;">
          <thead>
            <tr>
              <th>合约</th>
              <th>价格</th>
              <th>市值</th>
              <th>Vol/Mcap</th>
              <th>OI/Mcap</th>
              <th>Funding</th>
              <th>24h涨跌</th>
              <th>评分</th>
              <th>阶段</th>
              <th>标签</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- 详情页 -->
    <div id="detail" class="tab-content">
      <div class="detail-back">
        <button onclick="switchTab('list')">← 返回列表</button>
      </div>
      <div id="detail-content"></div>
    </div>
  </div>

  <script>
    let allData = [];

    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById(tab).classList.add('active');
      document.querySelector(`button[onclick="switchTab('${tab}')"]`).classList.add('active');
    }

    function colorClass(v) {
      if (v === null || v === undefined || isNaN(v)) return 'gray';
      if (v > 0) return 'green';
      if (v < 0) return 'red';
      return 'gray';
    }

    function fmtNum(n, d=2) {
      if (n === null || n === undefined || isNaN(n)) return '-';
      if (Math.abs(n) >= 1e9) return (n/1e9).toFixed(2) + 'B';
      if (Math.abs(n) >= 1e6) return (n/1e6).toFixed(2) + 'M';
      if (Math.abs(n) >= 1e3) return (n/1e3).toFixed(2) + 'K';
      return Number(n).toFixed(d);
    }

    async function getJSON(url) {
      try {
        const r = await fetch(url);
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        return await r.json();
      } catch (e) {
        console.error(`Failed to fetch ${url}:`, e);
        return null;
      }
    }

    // 获取 CoinGlass 数据（通过 iframe 或 API）
    async function fetchCoinglassData(symbol) {
      try {
        // 注意：CoinGlass 官方 API 需要 key，但我们可以尝试获取免费数据
        const cleanSymbol = symbol.replace('USDT', '');
        
        // 这里返回一个占位符，实际数据需要从 CoinGlass 网页爬取或使用官方 API
        return {
          liquidationData: null,
          unlockData: null,
          note: '清算和解锁数据需要访问 CoinGlass 官网获取'
        };
      } catch (e) {
        console.error('Failed to fetch CoinGlass data:', e);
        return null;
      }
    }

    // 判断币种所处阶段
    function getStage(row) {
      const { funding, volMcap, oiMcap, priceChange, score } = row;

      if (oiMcap > 5 && oiMcap < 15 && Math.abs(funding) < 0.02 && volMcap > 10) {
        return '吸筹';
      }

      if (oiMcap > 10 && funding > 0.01 && priceChange > 5) {
        return '拉升';
      }

      if (funding > 0.06 && oiMcap > 20 && volMcap > 30) {
        return '见顶';
      }

      if (oiMcap < 5 && funding < -0.02 && priceChange < -5) {
        return '下跌';
      }

      return '震荡';
    }

    // 计算庄家持仓推算
    function getWhaleHolding(row) {
      const { oiValue, mcap, volMcap, funding } = row;
      
      const oiMcapPct = mcap ? (oiValue / mcap) * 100 : 0;
      
      let whaleScore = 0;
      
      if (oiMcapPct > 15) whaleScore += 30;
      if (volMcap > 25) whaleScore += 25;
      if (funding > 0.03) whaleScore += 20;
      if (oiMcapPct > 20) whaleScore += 25;

      return Math.min(whaleScore, 100);
    }

    async function loadData() {
      const status = document.getElementById('status');
      const table = document.getElementById('table');
      const tbody = document.getElementById('tbody');

      status.style.display = 'block';
      status.innerText = '加载中...';
      table.style.display = 'none';
      tbody.innerHTML = '';

      try {
        const [exchangeInfo, ticker24h, premiumIndex, gecko] = await Promise.all([
          getJSON('https://fapi.binance.com/fapi/v1/exchangeInfo'),
          getJSON('https://fapi.binance.com/fapi/v1/ticker/24hr'),
          getJSON('https://fapi.binance.com/fapi/v1/premiumIndex'),
          getJSON('https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&order=market_cap_desc&per_page=250&page=1')
        ]);

        if (!exchangeInfo || !ticker24h || !premiumIndex) {
          throw new Error('币安 API 数据获取失败');
        }

        const symbols = exchangeInfo.symbols
          .filter(s => s.contractType === 'PERPETUAL' && s.quoteAsset === 'USDT' && s.status === 'TRADING')
          .map(s => s.symbol)
          .slice(0, 150);

        const tickerMap = Object.fromEntries(ticker24h.map(x => [x.symbol, x]));
        const premiumMap = Object.fromEntries(premiumIndex.map(x => [x.symbol, x]));
        
        const mcapMap = {};
        if (gecko) {
          gecko.forEach(x => {
            mcapMap[(x.symbol || '').toUpperCase() + 'USDT'] = x.market_cap;
          });
        }

        let rows = [];

        for (const symbol of symbols) {
          try {
            const t = tickerMap[symbol] || {};
            const p = premiumMap[symbol] || {};

            const price = parseFloat(p.markPrice || t.lastPrice || 0);
            if (!price) continue;

            const quoteVol = parseFloat(t.quoteVolume || 0);
            const funding = parseFloat(p.lastFundingRate || 0) * 100;
            const priceChange = parseFloat(t.priceChangePercent || 0);

            const mcap = mcapMap[symbol] || null;
            let oi = 0;
            let oiValue = 0;
            let volMcap = null;
            let oiMcap = null;

            if (t.openInterest) {
              oi = parseFloat(t.openInterest || 0);
              oiValue = oi * price;
            }

            if (mcap && mcap > 0) {
              volMcap = quoteVol / mcap * 100;
              oiMcap = oiValue / mcap * 100;
            }

            let score = 50;
            if (volMcap) score += Math.min(volMcap / 3, 20);
            if (oiMcap) score += Math.min(oiMcap / 3, 20);
            score += Math.min(Math.abs(funding) * 100, 10);
            score = Math.min(score, 100);

            const tags = [];
            if (volMcap && volMcap > 20) tags.push('放量');
            if (oiMcap && oiMcap > 10) tags.push('杠杆集中');
            if (funding > 0.04) tags.push('多头拥挤');
            if (funding < -0.04) tags.push('空头拥挤');

            const rowData = {
              symbol, 
              price, 
              mcap, 
              volMcap, 
              oiMcap, 
              funding, 
              priceChange, 
              score, 
              tags,
              oi,
              oiValue,
              quoteVol
            };

            rowData.stage = getStage(rowData);
            rowData.whaleScore = getWhaleHolding(rowData);

            rows.push(rowData);
          } catch (e) {
            console.error(`Error processing ${symbol}:`, e);
            continue;
          }
        }

        if (rows.length === 0) {
          throw new Error('没有获取到数据');
        }

        rows.sort((a, b) => b.score - a.score);
        allData = rows;

        document.getElementById('stat-total').innerText = rows.length;
        document.getElementById('stat-vol').innerText = rows.filter(x => x.volMcap && x.volMcap > 20).length;
        document.getElementById('stat-long').innerText = rows.filter(x => x.funding > 0.04).length;
        
        const avgFunding = rows.length ? rows.reduce((s, x) => s + x.funding, 0) / rows.length : 0;
        document.getElementById('stat-funding').innerText = avgFunding.toFixed(4) + '%';

        rows.slice(0, 80).forEach(row => {
          const tr = document.createElement('tr');
          tr.onclick = () => showDetail(row);
          tr.innerHTML = `
            <td class="symbol">${row.symbol}</td>
            <td>$${fmtNum(row.price, 6)}</td>
            <td>$${fmtNum(row.mcap, 2)}</td>
            <td class="${colorClass(row.volMcap)}">${row.volMcap ? row.volMcap.toFixed(2) + '%' : '-'}</td>
            <td class="${colorClass(row.oiMcap)}">${row.oiMcap ? row.oiMcap.toFixed(2) + '%' : '-'}</td>
            <td class="${colorClass(row.funding)}">${row.funding.toFixed(4)}%</td>
            <td class="${colorClass(row.priceChange)}">${row.priceChange.toFixed(2)}%</td>
            <td style="color:#06b6d4;font-weight:bold;">${row.score.toFixed(1)}</td>
            <td><span class="tag stage-${row.stage}">${row.stage}</span></td>
            <td>${row.tags.map(t => `<span class="tag">${t}</span>`).join('')}</td>
          `;
          tbody.appendChild(tr);
        });

        status.style.display = 'none';
        table.style.display = 'table';
        document.getElementById('last-update').innerText = '最后更新：' + new Date().toLocaleTimeString();

      } catch (e) {
        status.style.display = 'block';
        status.innerText = '加载失败：' + e.message;
        status.classList.add('error');
        table.style.display = 'none';
        console.error('Error:', e);
      }
    }

    function showDetail(row) {
      const symbol = row.symbol.replace('USDT', '');
      const coinglass_url = `https://www.coinglass.com/zh/futures/${symbol}`;
      const binance_url = `https://www.binance.com/zh-CN/futures/${row.symbol}`;
      const etherscan_url = `https://etherscan.io/token/${symbol}`;

      const html = `
        <div class="detail-header">
          <div class="detail-title">${row.symbol}</div>
          <div>
            <span class="detail-score">评分: ${row.score.toFixed(1)}/100</span>
            <span class="stage-${row.stage} detail-stage">${row.stage}</span>
          </div>
          <div class="links-group" style="margin-top: 15px;">
            <button class="link-btn" onclick="window.open('${binance_url}')">🔗 币安交易</button>
            <button class="link-btn" onclick="window.open('${coinglass_url}')">📊 CoinGlass持仓</button>
            <button class="link-btn" onclick="window.open('https://www.coinglass.com/zh/liq/${symbol}')">🔴 清算数据</button>
            <button class="link-btn" onclick="window.open('https://www.coinglass.com/zh/unlock/${symbol}')">🔓 解锁数据</button>
            <button class="link-btn" onclick="window.open('https://dexscreener.com/search?q=${symbol}')">⛓️ DEX成交</button>
          </div>
        </div>

        <div class="detail-grid">
          <div class="detail-section">
            <div class="section-title">📊 基本数据</div>
            <div class="detail-row">
              <span class="detail-label">当前价格</span>
              <span class="detail-value">$${row.price.toFixed(8)}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">市值</span>
              <span class="detail-value">$${fmtNum(row.mcap, 2)}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">24h涨跌</span>
              <span class="detail-value ${colorClass(row.priceChange)}">${row.priceChange.toFixed(2)}%</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">成交量(24h)</span>
              <span class="detail-value">$${fmtNum(row.quoteVol, 2)}</span>
            </div>
          </div>

          <div class="detail-section">
            <div class="section-title">🔥 持仓数据</div>
            <div class="detail-row">
              <span class="detail-label">未平仓持仓(OI)</span>
              <span class="detail-value">${fmtNum(row.oi, 2)}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">OI价值</span>
              <span class="detail-value">$${fmtNum(row.oiValue, 2)}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">OI/Mcap</span>
              <span class="detail-value ${colorClass(row.oiMcap)}">${row.oiMcap ? row.oiMcap.toFixed(2) + '%' : '-'}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">Vol/Mcap</span>
              <span class="detail-value ${colorClass(row.volMcap)}">${row.volMcap ? row.volMcap.toFixed(2) + '%' : '-'}</span>
            </div>
          </div>

          <div class="detail-section">
            <div class="section-title">💰 资金面</div>
            <div class="detail-row">
              <span class="detail-label">资金费率</span>
              <span class="detail-value ${colorClass(row.funding)}">${row.funding.toFixed(4)}%</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">多空拥挤度</span>
              <span class="detail-value">${row.funding > 0.04 ? '⚠️ 多头拥挤' : row.funding < -0.04 ? '⚠️ 空头拥挤' : '✅ 正常'}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">庄家持仓估算</span>
              <span class="detail-value" style="color:#a78bfa;">${row.whaleScore.toFixed(0)}/100</span>
            </div>
          </div>

          <div class="detail-section">
            <div class="section-title">🎯 阶段分析</div>
            <div class="detail-row">
              <span class="detail-label">当前阶段</span>
